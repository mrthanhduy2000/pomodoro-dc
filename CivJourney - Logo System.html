<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CivJourney · Logo System</title>
  <meta name="description" content="Hệ logo mới cho CivJourney: chronicle ring, wordmark, app icon và quy tắc dùng.">
  <meta name="theme-color" content="#c96442">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%23faf9f6'/%3E%3Cpath d='M44 19A16 16 0 1 0 44 45' fill='none' stroke='%231f1e1d' stroke-width='6' stroke-linecap='round'/%3E%3Ccircle cx='45' cy='21' r='4' fill='%23c96442'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400..700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --canvas: #faf9f6;
      --paper: #f4f2ec;
      --paper-2: #fffdf8;
      --ink: #1f1e1d;
      --ink-2: #3a3936;
      --muted: #6a6862;
      --muted-2: #9b9892;
      --line: #e4e0d6;
      --line-strong: #d6d0c4;
      --accent: #c96442;
      --accent-deep: #8a3f24;
      --accent-soft: #efc8ba;
      --night: #151310;
      --night-2: #1c1814;
      --night-ink: #f4efe7;
      --shadow: 0 24px 80px rgba(17, 14, 11, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      background:
        radial-gradient(circle at top, rgba(201, 100, 66, 0.18), transparent 36%),
        linear-gradient(180deg, #181410 0%, #110f0d 100%);
      color: var(--ink);
      font-family: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(to right, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 36px 36px;
      opacity: 0.22;
      pointer-events: none;
    }

    #root {
      position: relative;
      z-index: 1;
    }

    .page {
      max-width: 1500px;
      margin: 0 auto;
      padding: 28px 24px 96px;
    }

    .mono {
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .serif {
      font-family: "Source Serif 4", Georgia, serif;
    }

    .masthead {
      padding-bottom: 48px;
    }

    .intro-panel,
    .section-shell {
      position: relative;
      border: 1px solid rgba(228, 224, 214, 0.18);
      background: linear-gradient(180deg, rgba(255, 253, 248, 0.98) 0%, rgba(246, 243, 236, 0.96) 100%);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .intro-panel {
      border-radius: 34px;
      padding: 40px 40px 44px;
      display: grid;
      grid-template-columns: minmax(0, 1.06fr) minmax(320px, 0.94fr);
      gap: 28px;
      align-items: center;
    }

    .intro-panel::after {
      content: "";
      position: absolute;
      inset: 16px;
      border: 1px solid rgba(31, 30, 29, 0.06);
      border-radius: inherit;
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--accent-deep);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 8px rgba(201, 100, 66, 0.12);
    }

    .hero-title {
      margin: 22px 0 10px;
      font-family: "Source Serif 4", Georgia, serif;
      font-size: clamp(56px, 8vw, 102px);
      line-height: 0.92;
      letter-spacing: -0.06em;
      color: var(--ink);
    }

    .hero-title em {
      font-style: italic;
      font-weight: 500;
    }

    .intro-copy {
      max-width: 44rem;
      margin: 0;
      color: var(--ink-2);
      font-size: 16px;
      line-height: 1.7;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 28px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      padding: 0 14px;
      border: 1px solid rgba(201, 100, 66, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--ink);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .pill span:last-child {
      color: var(--muted);
      font-weight: 500;
      letter-spacing: 0;
    }

    .intro-copy-wrap {
      position: relative;
      z-index: 1;
    }

    .hero-stage {
      position: relative;
      min-height: 380px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(31, 30, 29, 0.06);
      border-radius: 28px;
      background:
        radial-gradient(circle at 50% 32%, rgba(201, 100, 66, 0.18), transparent 28%),
        linear-gradient(180deg, rgba(255, 253, 248, 0.96) 0%, rgba(244, 242, 236, 0.92) 100%);
    }

    .hero-mark-wrap {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: float 10s ease-in-out infinite;
    }

    .hero-mark-note {
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    .hero-orbit {
      position: absolute;
      inset: auto;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      border: 1px dashed rgba(201, 100, 66, 0.18);
      animation: rotate-slow 28s linear infinite;
    }

    .section {
      margin-top: 30px;
    }

    .section-shell {
      border-radius: 30px;
      padding: 26px 26px 28px;
      background: linear-gradient(180deg, rgba(250, 249, 246, 0.96) 0%, rgba(241, 237, 228, 0.94) 100%);
    }

    .section-head {
      display: grid;
      grid-template-columns: minmax(0, 0.55fr) minmax(0, 1fr);
      gap: 20px;
      align-items: end;
      margin-bottom: 22px;
    }

    .section-title {
      margin: 10px 0 0;
      font-family: "Source Serif 4", Georgia, serif;
      font-size: clamp(34px, 4vw, 48px);
      line-height: 0.98;
      letter-spacing: -0.045em;
      color: var(--ink);
    }

    .section-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .board-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 22px;
    }

    .board-wide {
      grid-column: span 2;
    }

    .board {
      margin: 0;
      border: 1px solid rgba(31, 30, 29, 0.08);
      background: rgba(255, 255, 255, 0.6);
      transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease;
    }

    .board:hover {
      transform: translateY(-4px);
      border-color: rgba(201, 100, 66, 0.22);
      box-shadow: 0 18px 48px rgba(17, 14, 11, 0.1);
    }

    .board-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(31, 30, 29, 0.08);
      background: rgba(255, 255, 255, 0.62);
    }

    .board-label {
      color: var(--ink);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .board-meta {
      color: var(--muted-2);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-align: right;
    }

    .board-frame {
      overflow: auto;
      background: rgba(255, 255, 255, 0.25);
    }

    .board-canvas {
      position: relative;
      width: max-content;
      min-width: 100%;
    }

    .grid-faint {
      background-image:
        linear-gradient(to right, rgba(31, 30, 29, 0.035) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(31, 30, 29, 0.035) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    .rule-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 24px;
    }

    .rule-card {
      padding: 18px 16px 0;
    }

    .rule-num {
      font-family: "Source Serif 4", Georgia, serif;
      font-size: 34px;
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--ink);
    }

    .rule-title {
      margin-top: 10px;
      font-family: "Source Serif 4", Georgia, serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.02em;
    }

    .rule-copy {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.65;
    }

    .rise-1 {
      animation: rise 720ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    .rise-2 {
      animation: rise 820ms cubic-bezier(0.2, 0.8, 0.2, 1) 120ms both;
    }

    .pulse {
      animation: pulse 2.6s ease-in-out infinite;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-8px);
      }
    }

    @keyframes rotate-slow {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.06);
        opacity: 0.82;
      }
    }

    @media (max-width: 1180px) {
      .rule-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 980px) {
      .page {
        padding: 18px 16px 72px;
      }

      .section-head {
        grid-template-columns: 1fr;
      }

      .intro-panel,
      .section-shell {
        border-radius: 24px;
      }

      .intro-panel {
        grid-template-columns: 1fr;
      }

      .hero-stage {
        min-height: 320px;
      }
    }

    @media (max-width: 760px) {
      .board-wide {
        grid-column: span 1;
      }

      .rule-grid {
        grid-template-columns: 1fr;
      }

      .intro-panel {
        padding: 28px 24px 32px;
      }

      .section-shell {
        padding: 20px;
      }

      .hero-orbit {
        width: 280px;
        height: 280px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel">
    const T = {
      canvas: '#faf9f6',
      paper: '#f4f2ec',
      paper2: '#fffdf8',
      ink: '#1f1e1d',
      ink2: '#3a3936',
      muted: '#6a6862',
      muted2: '#9b9892',
      line: '#e4e0d6',
      lineStrong: '#d6d0c4',
      accent: '#c96442',
      accentDeep: '#8a3f24',
      accentSoft: '#efc8ba',
      night: '#151310',
      night2: '#1c1814',
      nightInk: '#f4efe7',
    };

    const RULES = [
      {
        n: '01',
        t: 'Một motif duy nhất',
        d: 'Tất cả biến thể đều xoay quanh chronicle ring: vòng thời gian, hành trình tiến độ và điểm nhấn terracotta.'
      },
      {
        n: '02',
        t: 'Dùng đúng accent của app',
        d: 'Accent chính là terracotta #c96442. Bronze cũ đã bỏ để logo và UI nói cùng một giọng.'
      },
      {
        n: '03',
        t: 'Giữ đủ khoảng thở',
        d: 'Clear space tối thiểu bằng đường kính của chấm accent quanh mọi phía của mark.'
      },
      {
        n: '04',
        t: 'Ngưỡng thu nhỏ',
        d: 'Dưới 28px chỉ dùng Waypoint hoặc Orbit. Primary Chronicle không nên ép nhỏ hơn 40px.'
      },
      {
        n: '05',
        t: 'Cặp chữ chuẩn',
        d: 'Source Serif 4 cho wordmark, JetBrains Mono cho label phụ. Không trộn thêm serif khác.'
      },
      {
        n: '06',
        t: 'Nền được phép',
        d: 'Canvas, Paper và Night là ba nền chuẩn. Tránh đặt mark lên ảnh nhiều tương phản hoặc gradient gắt.'
      },
      {
        n: '07',
        t: 'Không thêm hiệu ứng nặng',
        d: 'Không shadow đậm, không bevel, không tô chuyển sắc bên trong mark. Sức nặng đến từ nét và khoảng trắng.'
      },
      {
        n: '08',
        t: 'Icon và logo không đổi chỗ',
        d: 'Waypoint dành cho app icon kích thước nhỏ. Chronicle là hero mark, không thay nhau ở những bối cảnh chính.'
      },
    ];

    function Section({ title, subtitle, children }) {
      return (
        <section className="section">
          <div className="section-shell">
            <div className="section-head">
              <div>
                <div className="eyebrow mono">Logo System</div>
                <h2 className="section-title">{title}</h2>
              </div>
              {subtitle ? <p className="section-subtitle">{subtitle}</p> : <div />}
            </div>
            <div className="board-grid">
              {children}
            </div>
          </div>
        </section>
      );
    }

    function Artboard({ label, meta, width, height, wide = false, children }) {
      return (
        <figure className={`board ${wide ? 'board-wide' : ''}`}>
          <div className="board-head">
            <div className="board-label mono">{label}</div>
            <div className="board-meta mono">{meta}</div>
          </div>
          <div className="board-frame">
            <div className="board-canvas" style={{ width, height }}>
              {children}
            </div>
          </div>
        </figure>
      );
    }

    function MarkChronicle({ size = 160, color = T.ink, accent = T.accent }) {
      return (
        <svg width={size} height={size} viewBox="0 0 120 120" fill="none">
          <circle cx="60" cy="60" r="52" stroke={color} strokeWidth="1.3" />
          <path d="M60 10 L60 17" stroke={accent} strokeWidth="2.4" strokeLinecap="round" />
          <path d="M81 34 A30 30 0 1 0 81 86" stroke={color} strokeWidth="6.6" fill="none" strokeLinecap="round" />
          <path d="M34 80 C43 72 49 68 59 62 C69 56 76 49 82 37" stroke={color} strokeWidth="1.8" fill="none" strokeLinecap="round" strokeLinejoin="round" />
          <line x1="28" y1="88" x2="92" y2="88" stroke={color} strokeWidth="1.15" opacity="0.5" />
          <line x1="37" y1="88" x2="37" y2="78" stroke={color} strokeWidth="1.8" strokeLinecap="round" />
          <line x1="60" y1="88" x2="60" y2="70" stroke={color} strokeWidth="1.5" strokeLinecap="round" />
          <line x1="83" y1="88" x2="83" y2="80" stroke={accent} strokeWidth="2.2" strokeLinecap="round" />
          <circle cx="83" cy="37" r="4.4" fill={accent} />
          <circle cx="83" cy="37" r="8.2" stroke={accent} strokeWidth="1.1" opacity="0.28" />
          <circle cx="60" cy="60" r="1.5" fill={color} opacity="0.65" />
        </svg>
      );
    }

    function MarkOrbit({ size = 120, color = T.ink, accent = T.accent }) {
      return (
        <svg width={size} height={size} viewBox="0 0 100 100" fill="none">
          <circle cx="50" cy="50" r="42" stroke={color} strokeWidth="1.2" />
          {[0, 90, 180, 270].map((deg) => {
            const a = (deg - 90) * Math.PI / 180;
            const x1 = 50 + Math.cos(a) * 38;
            const y1 = 50 + Math.sin(a) * 38;
            const x2 = 50 + Math.cos(a) * 42;
            const y2 = 50 + Math.sin(a) * 42;
            return <line key={deg} x1={x1} y1={y1} x2={x2} y2={y2} stroke={deg === 0 ? accent : color} strokeWidth={deg === 0 ? 2 : 1.2} strokeLinecap="round" />;
          })}
          <path d="M68 29 A24 24 0 1 0 68 71" stroke={color} strokeWidth="5.5" fill="none" strokeLinecap="round" />
          <path d="M37 64 C42 59 47 56 55 53 C60 51 64 47 69 36" stroke={color} strokeWidth="1.55" fill="none" strokeLinecap="round" />
          <circle className="pulse" cx="69" cy="36" r="4.1" fill={accent} />
        </svg>
      );
    }

    function MarkWaypoint({ size = 120, color = T.ink, accent = T.accent, fill = 'none' }) {
      return (
        <svg width={size} height={size} viewBox="0 0 100 100" fill="none">
          <rect x="7" y="7" width="86" height="86" rx="24" stroke={color} strokeWidth="1.35" fill={fill} />
          <rect x="14" y="14" width="72" height="72" rx="18" stroke={color} strokeWidth="0.7" opacity="0.32" />
          <path d="M64 30 A20 20 0 1 0 64 70" stroke={color} strokeWidth="5.4" fill="none" strokeLinecap="round" />
          <path d="M33 68 C40 62 44 58 51 54 C57 51 61 45 67 33" stroke={color} strokeWidth="1.7" fill="none" strokeLinecap="round" />
          <line x1="28" y1="76" x2="72" y2="76" stroke={color} strokeWidth="1" opacity="0.45" />
          <circle cx="67" cy="33" r="4.3" fill={accent} />
          <circle cx="67" cy="33" r="7.7" stroke={accent} strokeWidth="1" opacity="0.24" />
        </svg>
      );
    }

    function MarkHorizon({ size = 140, color = T.ink, accent = T.accent }) {
      return (
        <svg width={size} height={size} viewBox="0 0 120 120" fill="none">
          <line x1="18" y1="82" x2="102" y2="82" stroke={color} strokeWidth="1.15" />
          <path d="M78 43 A19 19 0 1 0 78 73" stroke={color} strokeWidth="4.8" fill="none" strokeLinecap="round" />
          <path d="M28 79 C41 73 48 69 58 61 C65 56 73 48 84 42" stroke={color} strokeWidth="1.75" fill="none" strokeLinecap="round" />
          <line x1="34" y1="82" x2="34" y2="72" stroke={color} strokeWidth="1.5" strokeLinecap="round" />
          <line x1="60" y1="82" x2="60" y2="67" stroke={color} strokeWidth="1.3" strokeLinecap="round" />
          <line x1="87" y1="82" x2="87" y2="76" stroke={accent} strokeWidth="2.1" strokeLinecap="round" />
          <circle cx="84" cy="42" r="4.2" fill={accent} />
          <circle cx="84" cy="42" r="7.8" stroke={accent} strokeWidth="1" opacity="0.26" />
        </svg>
      );
    }

    function MarkEpoch({ size = 140, color = T.ink, accent = T.accent }) {
      return (
        <svg width={size} height={size} viewBox="0 0 120 120" fill="none">
          <circle cx="60" cy="60" r="55" stroke={color} strokeWidth="1.2" />
          <circle cx="60" cy="60" r="47" stroke={color} strokeWidth="0.8" opacity="0.55" />
          <path d="M79 35 A28 28 0 1 0 79 85" stroke={color} strokeWidth="6.2" fill="none" strokeLinecap="round" />
          <path d="M40 78 C49 72 54 69 61 64 C68 59 74 50 80 39" stroke={color} strokeWidth="1.55" fill="none" strokeLinecap="round" />
          <circle cx="80" cy="39" r="4.3" fill={accent} />
          <path d="M39 89 H81" stroke={color} strokeWidth="0.95" opacity="0.45" />
          <text x="60" y="99" textAnchor="middle" fontFamily="'JetBrains Mono', monospace" fontSize="6.8" letterSpacing="2.8" fill={color}>MMXXVI</text>
        </svg>
      );
    }

    function Wordmark({ color = T.ink, accent = T.accent, size = 1, caption = 'Pomodoro qua các kỷ nguyên' }) {
      return (
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-start' }}>
          <div className="serif" style={{ fontSize: 58 * size, fontWeight: 600, lineHeight: 0.92, letterSpacing: '-0.055em', color }}>
            Civ<span style={{ fontStyle: 'italic', fontWeight: 520 }}>Journey</span>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 * size, marginTop: 14 * size }}>
            <span style={{ width: 34 * size, height: 1, background: color, opacity: 0.18 }} />
            <span className="mono" style={{ fontSize: 10 * size, letterSpacing: '0.24em', textTransform: 'uppercase', color: accent }}>
              {caption}
            </span>
            <span style={{ width: 8 * size, height: 8 * size, borderRadius: '50%', background: accent, boxShadow: `0 0 0 ${4 * size}px rgba(201, 100, 66, 0.12)` }} />
          </div>
        </div>
      );
    }

    function WordmarkStacked({ color = T.ink, accent = T.accent, size = 1 }) {
      return (
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center' }}>
          <div className="mono" style={{ fontSize: 9 * size, letterSpacing: '0.34em', textTransform: 'uppercase', color: accent }}>
